<svg xmlns="http://www.w3.org/2000/svg" width="86" height="86" viewBox="0 0 86 86" shape-rendering="crispEdges">

  <defs>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ea9c6"/>
      <stop offset="55%" stop-color="#3d7b99"/>
      <stop offset="100%" stop-color="#2b5770"/>
    </linearGradient>
    <linearGradient id="panelBlueDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#397893"/>
      <stop offset="100%" stop-color="#24465b"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7c56f"/>
      <stop offset="55%" stop-color="#72974b"/>
      <stop offset="100%" stop-color="#4b6a2d"/>
    </linearGradient>
    <linearGradient id="iconBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bff4ff"/>
      <stop offset="100%" stop-color="#65c9ea"/>
    </linearGradient>
    <linearGradient id="iconGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf7b2"/>
      <stop offset="100%" stop-color="#b2d06d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="130%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#07131d" flood-opacity="0.65"/>
    </filter>
    <pattern id="noise" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"/>
      <rect x="0" y="0" width="1" height="1" fill="#ffffff" opacity="0.05"/>
      <rect x="3" y="2" width="1" height="1" fill="#ffffff" opacity="0.04"/>
      <rect x="5" y="4" width="1" height="1" fill="#000000" opacity="0.09"/>
      <rect x="1" y="5" width="1" height="1" fill="#000000" opacity="0.08"/>
    </pattern>
    <style>
      .label{font-family:'Courier New',monospace;font-size:18px;font-weight:700;letter-spacing:0.8px;fill:#e9fbff;text-transform:uppercase}
      .labelSmall{font-family:'Courier New',monospace;font-size:16px;font-weight:700;letter-spacing:0.8px;fill:#e9fbff;text-transform:uppercase}
      .labelGreen{font-family:'Courier New',monospace;font-size:18px;font-weight:700;letter-spacing:0.8px;fill:#fff9be;text-transform:uppercase}
    </style>
  </defs>


    <g filter="url(#shadow)">
      <rect x="6" y="6" width="74" height="74" fill="#0a1b28"/>
      <rect x="8" y="8" width="70" height="70" fill="#16384a"/>
      <rect x="11" y="11" width="64" height="64" fill="url(#panelBlue)"/>
      <rect x="13" y="13" width="60" height="60" fill="url(#noise)" opacity="0.42"/>
      <rect x="13" y="13" width="60" height="4" fill="#90d8f0" opacity="0.55"/>
      <rect x="14" y="14" width="58" height="52" fill="none" stroke="#d3f7ff" opacity="0.28"/>
      <rect x="16" y="16" width="54" height="54" fill="none" stroke="#143246" opacity="0.72"/>
    </g>
    <rect x="40" y="22" width="6" height="8" fill="url(#iconBlue)"/>
<rect x="40" y="56" width="6" height="8" fill="url(#iconBlue)"/>
<rect x="22" y="40" width="8" height="6" fill="url(#iconBlue)"/>
<rect x="56" y="40" width="8" height="6" fill="url(#iconBlue)"/>
<rect x="28" y="28" width="6" height="6" fill="url(#iconBlue)"/>
<rect x="52" y="28" width="6" height="6" fill="url(#iconBlue)"/>
<rect x="28" y="52" width="6" height="6" fill="url(#iconBlue)"/>
<rect x="52" y="52" width="6" height="6" fill="url(#iconBlue)"/>
    <circle cx="43" cy="43" r="14" fill="none" stroke="url(#iconBlue)" stroke-width="6"/>
    <circle cx="43" cy="43" r="5" fill="url(#iconBlue)"/>
</svg>
